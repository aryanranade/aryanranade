<svg width="1012" height="270" viewBox="0 0 1012 270" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Aryan Ranade — AI/ML Engineer">
  <defs>
    <clipPath id="card"><rect x="1" y="1" width="1010" height="268" rx="16"/></clipPath>
    <linearGradient id="name" x1="0" y1="0" x2="1" y2="0.25">
      <stop offset="0%" stop-color="#0D9488">
        <animate attributeName="stop-color" values="#0D9488;#0D9488;#0D9488" dur="9s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0D9488">
        <animate attributeName="stop-color" values="#0D9488;#0D9488;#0D9488" dur="9s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <radialGradient id="gTeal" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#0D9488" stop-opacity="0.1"/><stop offset="100%" stop-color="#0D9488" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gViolet" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#0D9488" stop-opacity="0.08"/><stop offset="100%" stop-color="#0D9488" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0D9488" stop-opacity="0"/>
      <stop offset="30%" stop-color="#0D9488"/>
      <stop offset="70%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#0D9488" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="#57606A" opacity="0.14"/>
    </pattern>
  </defs>

  <rect x="1" y="1" width="1010" height="268" rx="16" fill="#FFFFFF"/>
  <g clip-path="url(#card)">
    <rect x="1" y="1" width="1010" height="268" fill="url(#dots)"/>
    <circle cx="880" cy="20" r="330" fill="url(#gTeal)">
      <animate attributeName="opacity" values="1;0.55;1" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="120" cy="270" r="300" fill="url(#gViolet)">
      <animate attributeName="opacity" values="0.55;1;0.55" dur="7s" repeatCount="indefinite"/>
    </circle>
    <g opacity="0.85">
      <circle cx="150" cy="200" r="2" fill="#0D9488">
        <animate attributeName="cy" values="220;60" dur="11s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.7;0" dur="11s" repeatCount="indefinite"/>
      </circle>
      <circle cx="320" cy="180" r="1.5" fill="#0D9488">
        <animate attributeName="cy" values="240;40" dur="14s" begin="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.6;0" dur="14s" begin="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="700" cy="210" r="2" fill="#0D9488">
        <animate attributeName="cy" values="230;70" dur="12s" begin="1.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.65;0" dur="12s" begin="1.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="860" cy="190" r="1.5" fill="#0D9488">
        <animate attributeName="cy" values="250;50" dur="13s" begin="6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.6;0" dur="13s" begin="6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="500" cy="220" r="1.8" fill="#0D9488">
        <animate attributeName="cy" values="235;45" dur="15s" begin="8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.5;0" dur="15s" begin="8s" repeatCount="indefinite"/>
      </circle>
    </g>
    <g opacity="0.5">
      <path d="M0,208 q55,-10 110,0 t110,0 t110,0 t110,0 t110,0 t110,0 t110,0 t110,0 t110,0 t110,0 t110,0 t110,0" stroke="#0D9488" stroke-opacity="0.18" stroke-width="1.2" fill="none">
        <animateTransform attributeName="transform" type="translate" from="-110 0" to="-330 0" dur="26s" repeatCount="indefinite"/>
      </path>
      <path d="M0,224 q55,-16 110,0 t110,0 t110,0 t110,0 t110,0 t110,0 t110,0 t110,0 t110,0 t110,0 t110,0 t110,0" stroke="#0D9488" stroke-opacity="0.45" stroke-width="1.5" fill="none">
        <animateTransform attributeName="transform" type="translate" from="0 0" to="-220 0" dur="16s" repeatCount="indefinite"/>
      </path>
      <path d="M0,240 q55,-13 110,0 t110,0 t110,0 t110,0 t110,0 t110,0 t110,0 t110,0 t110,0 t110,0 t110,0 t110,0" stroke="#0D9488" stroke-opacity="0.35" stroke-width="1.5" fill="none">
        <animateTransform attributeName="transform" type="translate" from="-220 0" to="0 0" dur="22s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>
  <rect x="1" y="1" width="1010" height="268" rx="16" stroke="#D0D7DE" stroke-width="1.5"/>

  <!-- status pill -->
  <g transform="translate(756,26)">
    <rect width="230" height="30" rx="15" fill="#F6F8FA" stroke="#D0D7DE"/>
    <circle cx="18" cy="15" r="4" fill="#0D9488">
      <animate attributeName="opacity" values="1;0.25;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="30" y="19.5" font-family="'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace" font-size="11" letter-spacing="1" fill="#57606A">OPEN TO AI/ML INTERNSHIPS</text>
  </g>
  <!-- terminal tag -->
  <text x="30" y="45" font-family="'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace" font-size="13" fill="#57606A" opacity="0.9"><tspan fill="#0D9488">~</tspan>/aryanranade <tspan fill="#0D9488">$</tspan></text>

  <text x="506" y="132" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="50" font-weight="800" letter-spacing="0.5" fill="#1F2328">Aryan Ranade</text>
  <rect x="426" y="154" width="160" height="2.5" rx="1.25" fill="url(#rule)"/>
  <text x="506" y="188" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" font-weight="500" letter-spacing="2.5" fill="#57606A">AI/ML ENGINEER<tspan fill="#0D9488" dx="10" dy="-2">·</tspan><tspan dx="10" dy="2">COMPUTER SCIENCE STUDENT</tspan></text>
</svg>
