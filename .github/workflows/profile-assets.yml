name: profile-assets

on:
  schedule:
    # daily, 03:17 UTC (off the hour to dodge the scheduled-job rush)
    - cron: "17 3 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  # Animated contribution snake, committed to the `output` branch.
  # Embedded in README via raw.githubusercontent.com/.../output/...
  snake:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: aryanranade
          outputs: |
            dist/snake-dark.svg?palette=github-dark&color_snake=#2DD4BF&color_dots=#161B22,#0E4F46,#136E60,#1AA189,#2DD4BF
            dist/snake-light.svg?palette=github-light&color_snake=#0D9488&color_dots=#EAEEF2,#B9E6DD,#7FD1C1,#3FB4A0,#0D9488
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Top-languages + analytics cards, regenerated from live API data and committed to main.
  cards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate dynamic cards
        run: python scripts/generate_cards.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USERNAME: aryanranade

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/langs-dark.svg assets/langs-light.svg assets/stats-dark.svg assets/stats-light.svg
          git diff --cached --quiet || { git commit -m "chore: refresh dynamic cards"; git push; }
